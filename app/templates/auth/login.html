<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OdontoClinica</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .login-box { width: 100%; max-width: 380px; }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-header h1 { font-size: 1.6rem; color: var(--primary); }
    .login-header h1 span { color: var(--accent); }
    .login-header p { color: var(--text-muted); font-size: .85rem; margin-top: .3rem; }
    .btn-login { width: 100%; justify-content: center; padding: .65rem; font-size: .95rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <h1>Odonto<span>Clinica</span></h1>
      <p>Sistema de Gestão</p>
    </div>

    <div class="card">
      {% with messages = get_flashed_messages(with_categories=True) %}
        {% for categoria, msg in messages %}
          <div class="alert alert-{{ categoria }}" style="margin-bottom:1rem">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="seu@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" class="form-control"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-login">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
