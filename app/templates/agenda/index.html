{% extends 'base.html' %}
{% block title %}Agenda{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Agenda</h1>
  </div>
  <a href="{{ url_for('agenda.novo') }}" class="btn btn-primary">+ Novo Agendamento</a>
</div>

<!-- Legenda de status -->
<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center">
  <span style="font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase">Status:</span>
  <span class="badge badge-agendado">Agendado</span>
  <span class="badge badge-confirmado">Confirmado</span>
  <span class="badge badge-em_atendimento">Em atendimento</span>
  <span class="badge badge-concluido">Concluído</span>
  <span class="badge badge-cancelado">Cancelado</span>
  <span class="badge badge-falta">Falta</span>
  <span style="margin-left:.5rem;font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase">Cor:</span>
  <span style="font-size:.75rem;color:var(--text-muted)">por procedimento</span>
</div>

<div class="card">
  <div class="agenda-filters">
    <div class="prof-filter" id="filtro-profissional">
      <button type="button" class="prof-chip active" data-id="">
        <span class="chip-dot" style="background:var(--text-muted)"></span>Todos
      </button>
      {% for p in profissionais %}
      <button type="button" class="prof-chip" data-id="{{ p.id }}">
        <span class="chip-dot" style="background:{{ p.cor_hex }}"></span>{{ p.nome }}
      </button>
      {% endfor %}
    </div>
    <div id="expediente-info" style="font-size:.78rem;color:var(--text-muted)"></div>
  </div>

  <div id="calendar"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  window.AGENDA_CONFIG = {
    novUrl: "{{ url_for('agenda.novo') }}",
    editUrl: "{{ url_for('agenda.index') }}".replace('/agenda/', '/agenda/editar/'),
    eventosUrl: "{{ url_for('agenda.api_eventos') }}",
    expedientesUrl: "{{ url_for('agenda.api_expedientes') }}",
  };
</script>
<script src="{{ url_for('static', filename='js/agenda.js') }}"></script>
{% endblock %}
