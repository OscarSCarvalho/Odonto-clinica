{% extends 'base.html' %}
{% block title %}{{ 'Editar' if pac else 'Novo' }} Paciente{% endblock %}
{% block content %}
{% set fd = form_data or {} %}

<div class="page-header">
  <div><h1 class="page-title">{{ 'Editar' if pac else 'Novo' }} Paciente</h1></div>
  <a href="{{ url_for('pacientes.index') }}" class="btn btn-ghost">← Voltar</a>
</div>

<div class="card" style="max-width:640px">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Nome completo *</label>
        <input type="text" name="nome" class="form-control" required
               value="{{ fd.nome or (pac.nome if pac else '') }}">
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14"
               value="{{ fd.cpf or (pac.cpf if pac else '') }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Telefone / WhatsApp</label>
        <input type="tel" name="telefone" class="form-control" placeholder="(11) 99999-0000"
               value="{{ fd.telefone or (pac.telefone if pac else '') }}">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" class="form-control"
               value="{{ fd.email or (pac.email if pac else '') }}">
      </div>
      <div class="form-group">
        <label>Data de nascimento</label>
        <input type="date" name="data_nascimento" class="form-control"
               value="{{ fd.data_nascimento or (pac.data_nascimento if pac else '') }}">
      </div>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <textarea name="observacoes" class="form-control" rows="3">{{ fd.observacoes or (pac.observacoes if pac else '') }}</textarea>
    </div>

    <div style="display:flex;gap:.75rem;margin-top:1.5rem">
      <button type="submit" class="btn btn-primary">
        {{ 'Salvar alterações' if pac else 'Cadastrar paciente' }}
      </button>
      <a href="{{ url_for('pacientes.index') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
